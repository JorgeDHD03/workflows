name: Keep Supabase Alive

on:
  schedule:
    # Se ejecuta cada 3 días a las 09:00 UTC
    # (el límite de pausa de Supabase Free es 7 días de inactividad,
    # así que 3 días da margen de sobra)
    - cron: '0 9 */3 * *'
  workflow_dispatch: {} # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/clients?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          echo "Respuesta HTTP: $response"
          
          if [ "$response" -ge 200 ] && [ "$response" -lt 500 ]; then
            echo "✅ Supabase respondió correctamente (proyecto activo)"
          else
            echo "⚠️ Respuesta inesperada: $response"
            exit 1
          fi
